version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy
    command: -config /etc/toxiproxy.json
    ports:
      - "8474:8474"   # Toxiproxy Admin API
      - "26379:26379" # Proxied Redis Port
    volumes:
      - ./toxiproxy.json:/etc/toxiproxy.json
    depends_on:
      - redis

  backend:
    build:
      context: ./taskflow
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskflow
      # Route all Redis traffic through Toxiproxy instead of directly to Redis
      SPRING_DATA_REDIS_HOST: toxiproxy
      SPRING_DATA_REDIS_PORT: 26379
    depends_on:
      - postgres
      - toxiproxy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
